<section class="contacts-section" id="contacts">
  <div style="max-width:1100px;margin:0 auto;">
    <h2><mark>Бізге</mark> жазыңыз</h2>
  </div>
  <div class="contacts-grid">

    <div class="info-col">

      <div class="info-card">
        <div class="info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </div>
        <div class="info-text">
          <small>Email</small>
          <strong>hello&#64;volunteer.kz</strong>
        </div>
      </div>

      <div class="info-card">
        <div class="info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07
                     A19.5 19.5 0 0 1 5.19 12.73 19.79 19.79 0 0 1 2.12 4.18
                     A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81
                     a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27
                     a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7
                     A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div class="info-text">
          <small>Телефон</small>
          <strong>+7 727 300 00 00</strong>
        </div>
      </div>

      <div class="info-card">
        <div class="info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 0 1 16 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div class="info-text">
          <small>Мекен-жай</small>
          <strong>Алматы қ., Абай д., 150</strong>
        </div>
      </div>

      <div class="social-card">
        <p>Біз әлеуметтік желілердеміз</p>
        <a href="#" class="social-link">Instagram
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
        <a href="#" class="social-link">Telegram
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
      </div>

    </div>

    <div class="form-card">
      <h3>Бізге жазыңыз</h3>

      @if (successMessage) {
        <div class="form-success">{{ successMessage }}</div>
      }
      @if (errorMessage) {
        <div class="form-error">{{ errorMessage }}</div>
      }

      <div class="form-row">
        <div class="form-group">
          <label>Атыңыз</label>
          <input name="name" [(ngModel)]="form.name"
                 type="text" placeholder="Аты-жөніңіз" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input name="email" [(ngModel)]="form.email"
                 type="email" placeholder="you@example.com" />
        </div>
      </div>

      <div class="form-group form-full">
        <label>Тақырыбы</label>
        <input name="topic" [(ngModel)]="form.topic"
               type="text" placeholder="Хабарламаның тақырыбы" />
      </div>

      <div class="form-group form-full">
        <label>Хабарлама</label>
        <textarea name="message" [(ngModel)]="form.message"
                  placeholder="Хабарлама жазу..."></textarea>
      </div>

      <button (click)="send()" [disabled]="isLoading" class="btn-send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        {{ isLoading ? 'Жіберілуде...' : 'Хабарлама жіберу' }}
      </button>
    </div>

  </div>
</section>
